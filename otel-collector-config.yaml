receivers:
  otlp:
    protocols:
      grpc:
      http:

exporters:
  debug:
    verbosity: detailed

  otlp_http/loki:
    endpoint: http://loki:3100/otlp

  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

processors:
  batch:

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_http/loki]

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp_grpc/tempo]